name: Build Historia Danet APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:    # Bisa trigger manual dari GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout kode ──
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Node.js ──
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Setup Java JDK 17 ──
      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 4. Setup Android SDK ──
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 5. Install dependencies ──
      - name: Install npm dependencies
        run: npm install

      # ── 6. Add Android platform ──
      - name: Add Capacitor Android platform
        run: |
          npx cap add android || echo "Platform already exists"
          npx cap sync android

      # ── 7. Replace AndroidManifest dengan versi kita ──
      - name: Apply AndroidManifest with permissions
        run: |
          cp AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          echo "AndroidManifest applied"

      # ── 8. Set Gradle permissions ──
      - name: Set Gradle executable
        run: chmod +x android/gradlew

      # ── 9. Build APK Debug ──
      - name: Build APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          JAVA_HOME: ${{ env.JAVA_HOME }}

      # ── 10. Upload APK sebagai artifact ──
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HistoriaDanet-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── 11. Tampilkan info APK ──
      - name: APK Info
        run: |
          APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            SIZE=$(du -sh "$APK_PATH" | cut -f1)
            echo "✅ APK berhasil dibuild!"
            echo "📦 Ukuran: $SIZE"
            echo "📍 Path: $APK_PATH"
          else
            echo "❌ APK tidak ditemukan!"
            exit 1
          fi
